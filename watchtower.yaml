launchpad:
  default_owner: my-team
  use_keyring: true
  series:
    - "2024.1"
    - "2025.1"
  development_focus: "2025.1"
github:
  use_keyring: false
gerrit:
  hosts:
    - url: https://review.opendev.org

projects:
  - name: sunbeam-charms
    code:
      forge: gerrit
      host: https://review.opendev.org
      project: openstack/sunbeam-charms
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: sunbeam-charms

  - name: sunbeam
    code:
      forge: github
      owner: canonical
      project: snap-openstack
    bugs:
      - forge: launchpad
        project: snap-openstack

  - name: openstack-hypervisor
    code:
      forge: github
      owner: canonical
      project: snap-openstack-hypervisor
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: snap-openstack-hypervisor

  - name: ubuntu-openstack-rocks
    artifact_type: rock
    code:
      forge: github
      owner: canonical
      project: ubuntu-openstack-rocks
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: ubuntu-openstack-rocks

  - name: cinder-volume
    code:
      forge: github
      owner: canonical
      project: snap-cinder-volume
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: snap-cinder-volume

  - name: epa-orchestrator
    code:
      forge: github
      owner: canonical
      project: snap-epa-orchestrator
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: snap-epa-orchestrator

  - name: manila-data
    code:
      forge: github
      owner: canonical
      project: snap-manila-data
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: snap-manila-data

  - name: openstack-network-agents
    code:
      forge: github
      owner: canonical
      project: snap-openstack-network-agents
    bugs:
      - forge: launchpad
        project: snap-openstack
      - forge: launchpad
        project: snap-openstack-network-agents

  - name: consul-client
    code:
      forge: github
      owner: canonical
      project: snap-consul-client
    bugs:
      - forge: launchpad
        project: snap-consul-client
    series:
      - "1.19"
    development_focus: "1.19"

packages:
  upstream:
    provider: openstack
    releases_repo: https://opendev.org/openstack/releases.git
    requirements_repo: https://opendev.org/openstack/requirements.git
  distros:
    ubuntu:
      mirror: http://archive.ubuntu.com/ubuntu
      components: [main, universe]
      releases:
        focal:
          suites: [release, updates, proposed]
          backports:
            yoga:
              parent_release: jammy
              sources:
                - mirror: https://ppa.launchpadcontent.net/ubuntu-cloud-archive/yoga-staging/ubuntu
                  suites: [release]
                  components: [main]
                - mirror: https://ubuntu-cloud.archive.canonical.com/ubuntu
                  suites: [focal-updates/yoga, focal-proposed/yoga]
                  components: [main]
        jammy:
          suites: [release, updates, proposed]
          backports:
            caracal:
              parent_release: noble
              sources:
                - mirror: https://ppa.launchpadcontent.net/ubuntu-cloud-archive/caracal-staging/ubuntu
                  suites: [release]
                  components: [main]
                - mirror: https://ubuntu-cloud.archive.canonical.com/ubuntu
                  suites: [jammy-updates/caracal, jammy-proposed/caracal]
                  components: [main]
        noble:
          suites: [release, updates, proposed]
          backports:
            epoxy:
              parent_release: plucky
              sources:
                - mirror: https://ppa.launchpadcontent.net/ubuntu-cloud-archive/epoxy-staging/ubuntu
                  suites: [release]
                  components: [main]
                - mirror: https://ubuntu-cloud.archive.canonical.com/ubuntu
                  suites: [noble-updates/epoxy, noble-proposed/epoxy]
                  components: [main]
            flamingo:
              parent_release: questing
              sources:
                - mirror: https://ppa.launchpadcontent.net/ubuntu-cloud-archive/flamingo-staging/ubuntu
                  suites: [release]
                  components: [main]
                - mirror: https://ubuntu-cloud.archive.canonical.com/ubuntu
                  suites: [noble-updates/flamingo, noble-proposed/flamingo]
                  components: [main]
            gazpacho:
              parent_release: resolute
              sources:
                - mirror: https://ppa.launchpadcontent.net/ubuntu-cloud-archive/gazpacho-staging/ubuntu
                  suites: [release]
                  components: [main]
                - mirror: https://ubuntu-cloud.archive.canonical.com/ubuntu
                  suites: [noble-updates/gazpacho, noble-proposed/gazpacho]
                  components: [main]
        plucky:
          suites: [release, updates, proposed]
        questing:
          suites: [release, updates, proposed]
        resolute:
          suites: [release, updates, proposed]
    debian:
      mirror: http://ftp.debian.org/debian
      components: [main]
      releases:
        trixie:
          suites: [release, backports]
          backports:
            flamingo:
              sources:
                - mirror: http://osbpo.debian.net/debian
                  suites:
                    [
                      trixie-flamingo-backports,
                      trixie-flamingo-backports-nochange,
                    ]
                  components: [main]
            gazpacho:
              sources:
                - mirror: http://osbpo.debian.net/debian
                  suites:
                    [
                      trixie-gazpacho-backports,
                      trixie-gazpacho-backports-nochange,
                    ]
                  components: [main]
        bookworm:
          suites: [release]
        unstable:
          suites: [release]
        experimental:
          suites: [release]
  sets:
    openstack-services:
      - aodh
      - barbican
      - blazar
      - ceilometer
      - cinder
      - cloudkitty
      - cyborg
      - designate
      - glance

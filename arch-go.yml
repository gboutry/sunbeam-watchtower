version: 1

threshold:
  compliance: 100
  coverage: 100

dependenciesRules:
  - package: "**.cmd.watchtower"
    shouldOnlyDependsOn:
      internal:
        - "**.internal.adapter.primary.**"
        - "**.pkg.**"

  - package: "**.internal.config"
    shouldNotDependsOn:
      internal:
        - "**.internal.adapter.**"
        - "**.internal.app"
        - "**.internal.core.**"

  - package: "**.internal.app"
    shouldOnlyDependsOn:
      internal:
        - "**.internal.adapter.secondary.**"
        - "**.internal.core.port.**"
        - "**.internal.core.service.**"
        - "**.internal.config.**"
        - "**.pkg.**"

  - package: "**.internal.core.port.**"
    shouldOnlyDependsOn:
      internal:
        - "**.pkg.**"

  - package: "**.internal.core.service.**"
    shouldOnlyDependsOn:
      internal:
        - "**.internal.core.port.**"
        - "**.pkg.**"

  - package: "**.internal.adapter.primary.**"
    shouldOnlyDependsOn:
      internal:
        - "**.internal.adapter.primary.**"
        - "**.internal.app"
        - "**.internal.core.port.**"
        - "**.internal.core.service.**"
        - "**.internal.config.**"
        - "**.pkg.**"

  - package: "**.internal.adapter.secondary.**"
    shouldOnlyDependsOn:
      internal:
        - "**.internal.adapter.secondary.**"
        - "**.internal.core.port.**"
        - "**.internal.config.**"
        - "**.pkg.**"

  - package: "**.pkg.**"
    shouldNotDependsOn:
      internal:
        - "**.internal.**"
        - "**.cmd.**"

  - package: "**.tools.**"
    shouldNotDependsOn:
      internal:
        - "**.internal.**"
        - "**.cmd.**"

contentsRules:
  - package: "**.internal.core.port.**"
    shouldOnlyContainInterfaces: true

  - package: "**.internal.adapter.**"
    shouldNotContainInterfaces: true

name: sunbeam-watchtower
base: core24
version: git
summary: Unified tracking and management tool for Canonical OpenStack (Sunbeam)
description: |
  Watchtower brings package, bug, build, review, release, and cache state
  behind one application surface so operators do not need to coordinate
  across multiple external systems manually.

grade: stable
confinement: strict

platforms:
  amd64:

parts:
  watchtower:
    plugin: go
    source: .
    build-snaps:
      - go/1.25/stable
    override-build: |
      go build -o $CRAFT_PART_INSTALL/bin/watchtower ./cmd/watchtower
      go build -o $CRAFT_PART_INSTALL/bin/watchtower-tui ./cmd/watchtower-tui
    stage-packages:
      - git

environment:
  XDG_CONFIG_HOME: $SNAP_USER_COMMON/.config
  XDG_CACHE_HOME: $SNAP_USER_COMMON/.cache
  XDG_RUNTIME_DIR: $SNAP_USER_COMMON/run
  WATCHTOWER_SSH_KEY_DIR: $SNAP_REAL_HOME/.ssh
  SSH_KNOWN_HOSTS: $SNAP_REAL_HOME/.ssh/known_hosts

apps:
  sunbeam-watchtower:
    command: bin/watchtower
    plugs:
      - network
      - network-bind
      - home
      - ssh-keys
  tui:
    command: bin/watchtower-tui
    plugs:
      - network
      - network-bind
      - home
      - ssh-keys
